<div class="quick-layers-container">
  @if (vm.isToogleMapMenuOpen()) {
    <div class="quick-layers-popup map-switch-popup">
      <div class="quick-popup-header">Базовая карта</div>
      <div class="map-options-list">
        @for (key of getMapKeys(); track key) {
          <button class="map-option-btn" 
            [class.active]="vm.activeMapId() === key"
            (click)="selectMap(key)">
            <div class="map-option-icon">
              @if (key === 'map1') {
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                </svg>
              } @else if (key === 'map2') {
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M3 20h18L14 6l-4 6-2-3-5 11z"/>
                  <path d="M5 16c3-2 7-2 7 2"/>
                </svg>
              } @else {
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="12" cy="12" r="10" />
                  <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
                  <path d="M2 12h20" />
                </svg>
              }
            </div>
            <div class="map-option-info">
              <div class="map-option-title">{{ mapsUrls[key].name }}</div>
              <div class="map-option-desc">
                @if (key === 'map1') { Векторная тактическая схема }
                @else if (key === 'map2') { Растровая топокарта 200К }
                @else if (key === 'map3') { Спутник Google Earth }
                @else if (key === 'map4') { Спутник Google с дорогами }
                @else if (key === 'map5') { Спутник Bing Aerial }
              </div>
            </div>
          </button>
        }
      </div>
    </div>
  }

  <button class="control-btn map-switch-btn" 
    [class.active]="vm.isToogleMapMenuOpen()" 
    (click)="toggleMenu()" 
    title="Смена базовой карты">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/>
      <line x1="8" y1="2" x2="8" y2="18"/>
      <line x1="16" y1="6" x2="16" y2="22"/>
    </svg>
  </button>
</div>
