<div class="app-root-layout">
  <header class="app-top-toolbar">
    <div class="toolbar-left">
      <div class="toolbar-group">
        <button class="tool-btn" [class.active]="vm.activeLineMode() === 'trench'" (click)="vm.activeLineMode() === 'trench' ? vm.cancelDrawingLine() : vm.startDrawingLine('trench')" title="Прокладка траншеи с бруствером">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 17l4-8 4 8 4-8 4 8 2-4" />
          </svg>
        </button>
        <button class="tool-btn" [class.active]="vm.activeLineMode() === 'comm_open'" (click)="vm.activeLineMode() === 'comm_open' ? vm.cancelDrawingLine() : vm.startDrawingLine('comm_open')" title="Открытый ход сообщения (двухсторонний бруствер)">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 12h18M7 12v5M11 7v5M15 12v5M19 7v5" />
          </svg>
        </button>
        <button class="tool-btn" [class.active]="vm.activeLineMode() === 'comm_covered'" (click)="vm.activeLineMode() === 'comm_covered' ? vm.cancelDrawingLine() : vm.startDrawingLine('comm_covered')" title="Крытый ход сообщения (перекрытая щель / блиндажное перекрытие)">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 12h18M6 8v8M10 8v8M14 8v8M18 8v8" />
          </svg>
        </button>
        <button class="tool-btn" [class.active]="vm.activeLineMode() === 'wire'" (click)="vm.activeLineMode() === 'wire' ? vm.cancelDrawingLine() : vm.startDrawingLine('wire')" title="Проволочное заграждение (МЗП)">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 12h16M7 8l2 8M15 8l2 8M8 12c0-2 2-4 4-4s4 2 4 4" />
          </svg>
        </button>
        <button class="tool-btn" [class.active]="vm.activeLineMode() === 'point'" (click)="vm.activeLineMode() === 'point' ? vm.cancelDrawingLine() : vm.startDrawingLine('point')" title="Нанести точку (ориентир)">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="4" fill="currentColor" />
            <circle cx="12" cy="12" r="9" />
          </svg>
        </button>
        <div class="toolbar-separator" style="width: 1px; height: 18px; background-color: #e2e8f0; margin: 0 8px; display: inline-block; vertical-align: middle;"></div>
        <button class="tool-btn" [class.active]="vm.isLineSmooth()" (click)="vm.toggleLineSmooth()" title="Сглаживание углов (Плавная кривая)">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12c4-6 8-6 12 0s6 6 6 0" />
          </svg>
        </button>
        <div class="toolbar-separator" style="width: 1px; height: 18px; background-color: #e2e8f0; margin: 0 8px; display: inline-block; vertical-align: middle;"></div>
        <div style="display: inline-flex; align-items: center; gap: 6px; user-select: none; vertical-align: middle; height: 28px;">
          <input 
            type="checkbox" 
            [checked]="vm.isTerrainOrientationEnabled()" 
            (change)="vm.toggleTerrainOrientation()" 
            id="terrain-orient-check"
            style="cursor: pointer; width: 13px; height: 13px; accent-color: #3b82f6; margin: 0; vertical-align: middle;"
          />
          <label for="terrain-orient-check" style="font-size: 11px; font-weight: 600; color: #475569; cursor: pointer; vertical-align: middle;">
            Авто-рельеф
          </label>
        </div>
      </div>
    </div>
  </header>

  <div class="map-view-layout">
    
    <app-map-sidebar />

    <div class="map-canvas-container" style="flex: 1; position: relative; height: 100%; display: flex; overflow: hidden;">
      <app-map-canvas style="flex: 1; width: 100%; height: 100%;" />
      
      <div class="map-controls">
        <app-scale-ruler style="display: contents;" />
        <app-toogle-map style="display: contents;" />
        <app-quick-layers-menu style="display: contents;" />
      </div>
    </div>
  </div>

  <footer class="app-status-bar">
    <div class="status-left">
      <span class="status-dot" [class.ready]="vm.isAppReady()"></span>
      <span class="status-text">{{ vm.isAppReady() ? 'Система готова' : 'Инициализация и загрузка карты...' }}</span>
    </div>

    <div class="status-center">
      <span class="scale-label">Масштаб:</span>
      <div class="scale-dropdown">
        <button class="scale-btn" (click)="vm.toggleScaleMenu($event)">
          <span>1 : {{ formatScale(vm.currentScale()) }}</span>
          <span class="scale-arrow">▼</span>
        </button>

        @if (vm.isScaleMenuOpen()) {
          <div class="scale-menu" (click)="$event.stopPropagation()">
            @for (preset of vm.scalePresets; track preset.scale) {
              <div class="scale-menu-item" (click)="selectPresetScale(preset, $event)">
                {{ preset.label }}
              </div>
            }
          </div>
        }
      </div>

      <div class="zoom-percent-container" style="margin-left: 8px;">
        <button class="zoom-arrow-btn" (click)="vm.adjustZoomPercent(-10)" title="Уменьшить зум">
          <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
        <input 
          type="text" 
          class="zoom-percent-input" 
          [value]="vm.zoomPercentText()" 
          (keydown)="vm.onZoomPercentKeydown($event)"
          (blur)="vm.onZoomPercentBlur($event)"
          (input)="vm.onZoomPercentInput($event)"
          title="Процент увеличения (зум карты)"
        />
        <button class="zoom-arrow-btn" (click)="vm.adjustZoomPercent(10)" title="Увеличить зум">
          <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="status-right">
      <span class="coords-label">Координаты:</span>
      <strong class="coords-value">{{ vm.cursorCoords() }}</strong>
    </div>
  </footer>
</div>
